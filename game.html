<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Cute Tetris</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffeef6;
    font-family:sans-serif;
}

.game{
    text-align:center;
}

h1{
    color:#ff4d8d;
}

canvas{
    background:white;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.score{
    margin-top:10px;
    font-size:20px;
}

button{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#ff77aa;
    color:white;
    font-size:16px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="game">

<a href="https://rla58911-dot.github.io/portfolio/">
<button class="backBtn">← Portfolio로 돌아가기</button>
</a>

<h1>🧸 Cute Tetris</h1>

<canvas id="tetris" width="240" height="400"></canvas>

<div class="score">
Score : <span id="score">0</span>
</div>

<button onclick="start()">Start</button>

</div>

<script>

const canvas = document.getElementById("tetris")
const ctx = canvas.getContext("2d")

const COL = 12
const ROW = 20
const SIZE = 20

ctx.scale(1,1)

let board = []
let score = 0
let dropCounter = 0
let dropInterval = 600
let lastTime = 0

const colors = [
null,
"#ff595e",
"#ffca3a",
"#8ac926",
"#1982c4",
"#6a4c93",
"#ff66c4",
"#00c2a8"
]

const pieces = {
T:[
[0,1,0],
[1,1,1]
],
O:[
[2,2],
[2,2]
],
L:[
[0,0,3],
[3,3,3]
],
J:[
[4,0,0],
[4,4,4]
],
S:[
[0,5,5],
[5,5,0]
],
Z:[
[6,6,0],
[0,6,6]
],
I:[
[7,7,7,7]
]
}

function createBoard(){

board = []

for(let r=0;r<ROW;r++){
board.push(new Array(COL).fill(0))
}

}

function drawCell(x,y,color){

ctx.fillStyle=color
ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE)

ctx.strokeStyle="#222"
ctx.lineWidth=2
ctx.strokeRect(x*SIZE,y*SIZE,SIZE,SIZE)

}

function drawBoard(){

board.forEach((row,y)=>{

row.forEach((value,x)=>{

if(value){
drawCell(x,y,colors[value])
}

})

})

}

let player = {
pos:{x:0,y:0},
matrix:null
}

function createPiece(){

const keys = Object.keys(pieces)
const piece = pieces[keys[Math.floor(Math.random()*keys.length)]]

player.matrix = piece
player.pos.y = 0
player.pos.x = Math.floor(COL/2) - Math.floor(piece[0].length/2)

}

function drawPiece(){

player.matrix.forEach((row,y)=>{

row.forEach((value,x)=>{

if(value){

drawCell(x+player.pos.x,y+player.pos.y,colors[value])

}

})

})

}

function collide(){

for(let y=0;y<player.matrix.length;y++){

for(let x=0;x<player.matrix[y].length;x++){

if(player.matrix[y][x]!==0){

let newX = x+player.pos.x
let newY = y+player.pos.y

if(newX<0 || newX>=COL || newY>=ROW) return true

if(board[newY] && board[newY][newX]) return true

}

}

}

return false

}

function merge(){

player.matrix.forEach((row,y)=>{

row.forEach((value,x)=>{

if(value){

board[y+player.pos.y][x+player.pos.x]=value

}

})

})

}

function rotate(){

const m = player.matrix

const rotated = m[0].map((_,i)=>m.map(row=>row[i]).reverse())

const prev = player.matrix

player.matrix = rotated

if(collide()){
player.matrix = prev
}

}

function playerDrop(){

player.pos.y++

if(collide()){

player.pos.y--

merge()

clearLines()

createPiece()

if(collide()){

alert("Game Over 🧸")

createBoard()
score=0

}

}

dropCounter = 0

}

function clearLines(){

for(let y=ROW-1;y>=0;y--){

if(board[y].every(v=>v>0)){

board.splice(y,1)
board.unshift(new Array(COL).fill(0))

score += 10
document.getElementById("score").innerText = score

y++

}

}

}

function update(time=0){

const delta = time-lastTime
lastTime = time

dropCounter += delta

if(dropCounter>dropInterval){

playerDrop()

}

draw()

requestAnimationFrame(update)

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawBoard()

drawPiece()

}

document.addEventListener("keydown",e=>{

if(e.key==="ArrowLeft"){

player.pos.x--
if(collide()) player.pos.x++

}

else if(e.key==="ArrowRight"){

player.pos.x++
if(collide()) player.pos.x--

}

else if(e.key==="ArrowDown"){

playerDrop()

}

else if(e.key==="ArrowUp"){

rotate()

}

})

function start(){

createBoard()
createPiece()

score = 0
document.getElementById("score").innerText = score

update()

}

</script>

</body>
</html>
